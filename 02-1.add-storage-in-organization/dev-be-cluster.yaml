# 어플리케이션 클러스터에서 실행
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{organization_name}}-dev
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{organization_name}}-sc
parameters:
  server: {{dev_backend_nas_ip}}
  share: {{dev_backend_nas_path}}
provisioner: nfs.csi.k8s.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
#provisioner: nas.csi.ncloud.com
#volumeBindingMode: WaitForFirstConsumer
#mountOptions:
#  - hard
#  - nolock
#  - nfsvers=3

---
apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: {{organization_name}}-dev
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |-
    {
        "auths": {
            "{{image_registry}}": {
                "username":"{{harbor_robot_id}}",
                "password":"{{harbor_robot_pw}}",
                "auth": "{{harbor_robot_auth}}"
            }
        }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-tls
  namespace: {{organization_name}}-dev
type: kubernetes.io/tls
stringData:
  tls.crt: |
    {{wildcard_dev_ssl_crt|indent(4)}}

  tls.key: |
    {{wildcard_dev_ssl_key|indent(4)}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: {{organization_name}}-dev
secrets:
- name: regcred
imagePullSecrets:
- name: regcred
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{organization_name}}-dev
  name: {{organization_name}}-dev-app-cm-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "deployments", "configmaps","secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{organization_name}}-dev-app-cm-role-binding
  namespace: {{organization_name}}-dev
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{organization_name}}-dev
roleRef:
  kind: Role
  name: {{organization_name}}-dev-app-cm-role
  apiGroup: rbac.authorization.k8s.io
