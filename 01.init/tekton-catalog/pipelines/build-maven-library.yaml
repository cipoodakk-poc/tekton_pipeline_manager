apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-maven-library
  namespace: tekton-catalog
spec:
  description: |
    This Pipeline for maven library build.
  params:
  - name: git-host-url
    default: "{{gitea_domain}}"
    type: string
  - name: code-repo-org
    default: sample
    type: string
  - name: code-repo-name
    default: sample-egovsht-core
    type: string
  - name: code-repo-url
    description: Code Repository URL to clone from.
    default:  $(params.git-host-url)/$(params.code-repo-org)/$(params.code-repo-name).git
    type: string
  - name: code-revision
    description: Revision to checkout. (branch, tag, sha, ref, etc...)
    default: main
    type: string
  - name: java-version
    default: "8"
    type: string
  - name: artifact-find-pattern
    default: target/*.jar
    type: string
  - name: artifact-rename
    default: ""
    type: string
  - name: skip-code-test
    default: "false"
    type: string
  - name: skip-code-analysis
    default: "false"
    type: string
  - name: skip-code-artifact
    default: "false"
    type: string
  - name: skip-build-trigger
    default: "true"
    type: string
  - name: app-env
    default: tdev
    type: string
  - name: app-name
    default: $(params.code-repo-name)
    type: string
  - name: build-trigger-scripts
    default: []
    type: array
  - name: working-pr-dir
    default: $(context.pipelineRun.name)
    type: string
  tasks:
  - displayName: Code Fetch
    name: code-fetch
    params:
    - name: gitInitImage
      value: "{{image_registry}}/nnd/tekton-cicd/git-init:v0.40.2-tz"
    - name: crtFileName
      value: ca-certificates.crt
    - name: sslVerify
      value: "false"
    - name: deleteExisting
      value: "true"
    - name: subdirectory
      value: $(params.working-pr-dir)/$(params.code-repo-name)
    - name: url
      value: $(params.code-repo-url)
    - name: revision
      value: $(params.code-revision)
    taskRef:
      kind: Task
      params:
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: namespace
        value: tekton-catalog
      resolver: cluster
    workspaces:
    - name: output
      workspace: shared-data
    - name: basic-auth
      workspace: gitconfig
    - name: ssl-ca-directory
      workspace: ssl-ca-directory
  - displayName: Code Build
    name: code-build
    params:
    - name: BASH_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/bash:5.2.21"
    - name: MAVEN_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/maven:3.9.5-eclipse-temurin-$(params.java-version)"
    - name: CONTEXT_DIR
      value: $(params.working-pr-dir)/$(params.code-repo-name)
    - name: GOALS
      value:
      - clean
      - package
      - -B
      - -U
      - -P$(params.app-env)
      - -DskipTests=true
      - -Dmaven.test.skip=true
    - name: ARTIFACT_FIND_PATTERN
      value: $(params.artifact-find-pattern)
    - name: ARTIFACT_RENAME
      value: $(params.artifact-rename)
    runAfter:
    - code-fetch
    taskRef:
      kind: Task
      params:
      - name: kind
        value: task
      - name: name
        value: maven
      - name: namespace
        value: tekton-catalog
      resolver: cluster
    workspaces:
    - name: source
      workspace: shared-data
    - name: ssl-ca-directory
      workspace: ssl-ca-directory
    - name: maven-settings
      workspace: maven-settings
    - name: maven-local-repo
      workspace: maven-local-repo
  - displayName: Code JunitTest
    name: code-test
    when:
    # - input: $(params.app-env)
    #   operator: in
    #   values:
    #   - dev
    - input: $(params.skip-code-test)
      operator: in
      values:
      - "false"
    params:
    - name: BASH_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/bash:5.2.21"
    - name: MAVEN_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/maven:3.9.5-eclipse-temurin-$(params.java-version)"
    - name: CONTEXT_DIR
      value: $(params.working-pr-dir)/$(params.code-repo-name)
    - name: GOALS
      value:
      - surefire-report:report
      - -B
      - -U
      - -P$(params.app-env)
      - -DskipTests=false
      - -Dmaven.test.skip=false
    - name: ARTIFACT_FIND_PATTERN
      value: $(params.artifact-find-pattern)
    - name: ARTIFACT_RENAME
      value: $(params.artifact-rename)
    runAfter:
    - code-build
    taskRef:
      kind: Task
      params:
      - name: kind
        value: task
      - name: name
        value: maven
      - name: namespace
        value: tekton-catalog
      resolver: cluster
    workspaces:
    - name: source
      workspace: shared-data
    - name: ssl-ca-directory
      workspace: ssl-ca-directory
    - name: maven-settings
      workspace: maven-settings
    - name: maven-local-repo
      workspace: maven-local-repo
  - displayName: Code Analysis
    name: code-analysis
    when:
    # - input: $(params.app-env)
    #   operator: in
    #   values:
    #   - dev
    - input: $(params.skip-code-analysis)
      operator: in
      values:
      - "false"
    params:
    - name: CONTEXT_DIR
      value: $(params.working-pr-dir)/$(params.code-repo-name)
    - name: SONAR_HOST_URL
      value: "{{sonar_host_url_internal}}"
    - name: SONAR_PROJECT_KEY
      value: $(params.code-repo-name)
    - name: PROJECT_VERSION
      value: $(tasks.code-build.results.version)
    - name: SOURCE_TO_SCAN
      value: .
    - name: SONAR_SCANNER_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/sonar-scanner-cli:5.0.1"
    - name: SONAR_LOGIN_KEY
      value: login
    - name: SONAR_PASSWORD_KEY
      value: password
    - name: SONAR_LINKS_CI
      value: https://devops-tekton.133-186-152-134.nip.io/#/namespaces/$(context.pipelineRun.namespace)/pipelineruns/$(context.pipelineRun.name)?pipelineTask=code-analysis&step=sonar-scan
    - name: SONAR_LINKS_SCM
      value: $(params.code-repo-url)
    - name: SONAR_LANGUAGE
      value: java
    - name: SONAR_INCLUSIONS
      value: src/**/*.java
    - name: SONAR_JAVA_SOURCE
      value: $(params.java-version)
    - name: SONAR_JAVA_BINARIES
      value: target/classes
    - name: SONAR_JAVA_LIBRARIES
      value: target/**/*.jar
    - name: SONAR_JUNIT_REPORTPATHS
      value: target/surefire-reports
    - name: SONAR_PROP_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/bash:5.2.21"
    - name: SONAR_BRANCH_NAME
      value: $(params.code-revision)
    runAfter:
    - code-test
    taskRef:
      kind: Task
      params:
      - name: kind
        value: task
      - name: name
        value: sonarqube-scanner
      - name: namespace
        value: tekton-catalog
      resolver: cluster
    workspaces:
    - name: source
      workspace: shared-data
    - name: ssl-ca-directory
      workspace: ssl-ca-directory
    - name: sonar-credentials
      workspace: sonar-credentials
    - name: maven-local-repo
      workspace: maven-local-repo
  - displayName: Code Artifact
    name: code-artifact
    when:
    # - input: $(params.app-env)
    #   operator: in
    #   values:
    #   - dev
    - input: $(params.skip-code-artifact)
      operator: in
      values:
      - "false"
    params:
    - name: BASH_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/bash:5.2.21"
    - name: MAVEN_IMAGE
      value: "{{image_registry}}/nnd/tekton-cicd/maven:3.9.5-eclipse-temurin-$(params.java-version)"
    - name: CONTEXT_DIR
      value: $(params.working-pr-dir)/$(params.code-repo-name)
    - name: GOALS
      value:
      - deploy
      - -B
      - -U
      - -P$(params.app-env)
      - -DskipTests=true
      - -Dmaven.test.skip=true
    - name: ARTIFACT_FIND_PATTERN
      value: $(params.artifact-find-pattern)
    - name: ARTIFACT_RENAME
      value: $(params.artifact-rename)
    runAfter:
    - code-analysis
    taskRef:
      kind: Task
      params:
      - name: kind
        value: task
      - name: name
        value: maven
      - name: namespace
        value: tekton-catalog
      resolver: cluster
    workspaces:
    - name: source
      workspace: shared-data
    - name: ssl-ca-directory
      workspace: ssl-ca-directory
    - name: maven-settings
      workspace: maven-settings
    - name: maven-local-repo
      workspace: maven-local-repo
  finally:
  - displayName: Build Trigger
    name: build-trigger
    when:
    - input: $(tasks.status)
      operator: in
      values:
      - Completed
      - Succeeded
    - input: $(params.skip-build-trigger)
      operator: in
      values:
      - "false"
    params:
    - name: ARGS
      value:
      - $(params.build-trigger-scripts)
    taskSpec:
      metadata: {}
      params:
      - name: ARGS
        type: array
      spec: null
      steps:
      - args:
        - $(params.ARGS)
        computeResources: {}
        image: "{{image_registry}}/nnd/tekton-cicd/curl:8.5.0"
        name: curl
        script: |
          for arg in "$@"
          do
            eval "$arg"
          done
  - displayName: Cleanup Policy
    name: cleanup-policy
    params:
    - name: SCRIPT
      value: |
        find $(workspaces.source.path) -mindepth 1 -maxdepth 1 -type d -name "$(params.working-pr-dir)" | xargs -r rm -rf

        tkn pipelinerun delete --force --keep 0 --all $1 -n $(context.pipelineRun.namespace)
        tkn pipelinerun list $1 -n $(context.pipelineRun.namespace)
    - name: ARGS
      value:
      - --label app=$(params.app-name),env=$(params.app-env),type=build,tekton.dev/pipeline!=$(params.app-name)-$(params.app-env)-build-pr
    taskSpec:
      metadata: {}
      params:
      - name: SCRIPT
        type: string
      - name: ARGS
        type: array
      spec: null
      steps:
      - args:
        - $(params.ARGS)
        computeResources: {}
        image: "{{image_registry}}/nnd/tekton-cicd/tkn:v0.12.0"
        name: tkn
        script: |
          if [ "$(workspaces.kubeconfig.bound)" = "true" ] && [ -e $(workspaces.kubeconfig.path)/kubeconfig ]; then
            export KUBECONFIG="$(workspaces.kubeconfig.path)"/kubeconfig
          fi
          eval "$(params.SCRIPT)"
      workspaces:
      - name: source
      - name: kubeconfig
    workspaces:
    - name: source
      workspace: shared-data
    - name: kubeconfig
      workspace: kubeconfig
  workspaces:
  - name: shared-data
  - name: gitconfig
  - name: ssl-ca-directory
  - name: maven-settings
  - name: maven-local-repo
  - name: sonar-credentials
  - name: kubeconfig