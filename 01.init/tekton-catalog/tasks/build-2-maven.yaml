apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/categories: Build Tools
    tekton.dev/pipelines.minVersion: 0.17.0
    tekton.dev/platforms: linux/amd64,linux/s390x,linux/ppc64le
    tekton.dev/tags: build-tool
  labels:
    app.kubernetes.io/version: "0.3.1"
    hub.tekton.dev/catalog: tekton
  name: maven
  namespace: tekton-catalog
spec:
  description: This Task can be used to run a Maven build. It uses a workspace to
    store m2 local repo.
  params:
  - default: registry.access.redhat.com/ubi8/ubi-minimal:8.2
    name: BASH_IMAGE
    type: string
  - default: gcr.io/cloud-builders/mvn@sha256:57523fc43394d6d9d2414ee8d1c85ed7a13460cbb268c3cd16d28cfb3859e641
    description: Maven base image
    name: MAVEN_IMAGE
    type: string
  - name: GOALS
    description: maven goals to run
    default:
    - package
    type: array
  - default: ""
    description: The Maven repository mirror url
    name: MAVEN_MIRROR_URL
    type: string
  - default: ""
    description: The username for the server
    name: SERVER_USER
    type: string
  - default: ""
    description: The password for the server
    name: SERVER_PASSWORD
    type: string
  - default: ""
    description: The username for the proxy server
    name: PROXY_USER
    type: string
  - default: ""
    description: The password for the proxy server
    name: PROXY_PASSWORD
    type: string
  - default: ""
    description: Port number for the proxy server
    name: PROXY_PORT
    type: string
  - default: ""
    description: Proxy server Host
    name: PROXY_HOST
    type: string
  - default: ""
    description: Non proxy server host
    name: PROXY_NON_PROXY_HOSTS
    type: string
  - default: http
    description: Protocol for the proxy ie http or https
    name: PROXY_PROTOCOL
    type: string
  - default: .
    description: The context directory within the repository for sources on which
      we want to execute maven goals.
    name: CONTEXT_DIR
    type: string
  - name: CRT_FILE_NAME
    description: file name of mounted crt using ssl-ca-directory workspace. default value is ca-bundle.crt.
    type: string
    default: "ca-bundle.crt"
  #
  - default: ""
    name: ARTIFACT_FIND_PATTERN
    type: string
  - default: ""
    name: ARTIFACT_RENAME
    type: string
  results:
  - name: buildDirectory
    type: string
  - name: version
    type: string
  - name: artifactId
    type: string
  - name: artifactSourceName
    type: string
  - name: artifactTargetName
    type: string
  steps:
  - computeResources: {}
    image: $(params.BASH_IMAGE)
    name: mvn-settings
    script: |
      #!/usr/bin/env bash

      [[ -f $(workspaces.maven-settings.path)/settings.xml ]] && \
      echo "using existing $(workspaces.maven-settings.path)/settings.xml" && exit 0

      cat > "$(workspaces.maven-settings.path)/settings.xml" <<EOF
      <settings>
        <servers>
          <!-- The servers added here are generated from environment variables. Don't change. -->
          <!-- ### SERVER's USER INFO from ENV ### -->
        </servers>
        <mirrors>
          <!-- The mirrors added here are generated from environment variables. Don't change. -->
          <!-- ### mirrors from ENV ### -->
        </mirrors>
        <proxies>
          <!-- The proxies added here are generated from environment variables. Don't change. -->
          <!-- ### HTTP proxy from ENV ### -->
        </proxies>
      </settings>
      EOF

      xml=""
      if [ -n "$(params.PROXY_HOST)" ] && [ -n "$(params.PROXY_PORT)" ]; then
        xml="<proxy>\
          <id>genproxy</id>\
          <active>true</active>\
          <protocol>$(params.PROXY_PROTOCOL)</protocol>\
          <host>$(params.PROXY_HOST)</host>\
          <port>$(params.PROXY_PORT)</port>"
        if [ -n "$(params.PROXY_USER)" ] && [ -n "$(params.PROXY_PASSWORD)" ]; then
          xml="$xml\
              <username>$(params.PROXY_USER)</username>\
              <password>$(params.PROXY_PASSWORD)</password>"
        fi
        if [ -n "$(params.PROXY_NON_PROXY_HOSTS)" ]; then
          xml="$xml\
              <nonProxyHosts>$(params.PROXY_NON_PROXY_HOSTS)</nonProxyHosts>"
        fi
        xml="$xml\
            </proxy>"
        sed -i "s|<!-- ### HTTP proxy from ENV ### -->|$xml|" "$(workspaces.maven-settings.path)/settings.xml"
      fi

      if [ -n "$(params.SERVER_USER)" ] && [ -n "$(params.SERVER_PASSWORD)" ]; then
        xml="<server>\
          <id>serverid</id>"
        xml="$xml\
              <username>$(params.SERVER_USER)</username>\
              <password>$(params.SERVER_PASSWORD)</password>"
        xml="$xml\
            </server>"
        sed -i "s|<!-- ### SERVER's USER INFO from ENV ### -->|$xml|" "$(workspaces.maven-settings.path)/settings.xml"
      fi

      if [ -n "$(params.MAVEN_MIRROR_URL)" ]; then
        xml="    <mirror>\
          <id>mirror.default</id>\
          <url>$(params.MAVEN_MIRROR_URL)</url>\
          <mirrorOf>central</mirrorOf>\
        </mirror>"
        sed -i "s|<!-- ### mirrors from ENV ### -->|$xml|" "$(workspaces.maven-settings.path)/settings.xml"
      fi
  - computeResources: {}
    env:
    - name: TZ
      value: Asia/Seoul
    args:
    - -s
    - $(workspaces.maven-settings.path)/settings.xml
    - $(params.GOALS)
    - -Dmaven.repo.local=$(workspaces.maven-local-repo.path)/.m2
    # command:
    # - /usr/bin/mvn
    image: $(params.MAVEN_IMAGE)
    name: mvn-goals
    workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
    script: |
      #!/usr/bin/env bash

      if [ "$(workspaces.ssl-ca-directory.bound)" = "true" ]; then
        for f in $(workspaces.ssl-ca-directory.path)/*
        do
          $JAVA_HOME/bin/keytool -importcert -file "${f}" -alias $(basename "${f}") -keystore $(find $JAVA_HOME -name cacerts) -storepass changeit -noprompt
        done
      fi

      mvn $*

      if [ $? -ne 0 ]; then
        exit 1
      fi

      if [ -n "$(params.ARTIFACT_FIND_PATTERN)" ]; then
        BUILD_DIRECTORY="$(echo $(params.ARTIFACT_FIND_PATTERN) | xargs -r dirname | head -1 | tr -d '\n')"
        printf "%s" "${BUILD_DIRECTORY}" > "$(results.buildDirectory.path)"

        if [[ -f $BUILD_DIRECTORY/maven-archiver/pom.properties ]]; then
          ARTIFACT_ID="$(grep '^artifactId=' $BUILD_DIRECTORY/maven-archiver/pom.properties | cut -d'=' -f2 | tr -d '\n')"
          printf "%s" "${ARTIFACT_ID}" > "$(results.artifactId.path)"

          VERSION="$(grep "^version=" $BUILD_DIRECTORY/maven-archiver/pom.properties | cut -d'=' -f2 | tr -d '\n')"
          printf "%s" "${VERSION}" > "$(results.version.path)"
        fi

        ARTIFACT_SOURCE_NAME="$(echo $(params.ARTIFACT_FIND_PATTERN) | xargs -r basename | head -1 | tr -d '\n')"
        printf "%s" "${ARTIFACT_SOURCE_NAME}" > "$(results.artifactSourceName.path)"

        ARTIFACT_TARGET_NAME=$ARTIFACT_SOURCE_NAME
        printf "%s" "${ARTIFACT_TARGET_NAME}" > "$(results.artifactTargetName.path)"

        if [ -n "$(params.ARTIFACT_RENAME)" ]; then
          ARTIFACT_TARGET_NAME="$(echo $(params.ARTIFACT_RENAME) | tr -d '\n')"
          printf "%s" "${ARTIFACT_TARGET_NAME}" > "$(results.artifactTargetName.path)"
        fi
      fi

  workspaces:
  - description: The workspace consisting of maven project.
    name: source
  - name: ssl-ca-directory
    optional: true
  - description: The workspace consisting of the custom maven settings provided by
      the user.
    name: maven-settings
  - description: Local repo (m2) workspace
    name: maven-local-repo
    optional: true

