apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: polaris-audit
  namespace: tekton-catalog
spec:
  description: |
    Runs Polaris in a Docker container to analyze Kubernetes manifests or other YAML files
    for best practices, potential issues, and security vulnerabilities. Designed for
    seamless integration with Tekton pipelines.
  params:
  - default: ""
    name: CONTEXT_DIR
    type: string
  - default: quay.io/fairwinds/polaris:9.6
    name: IMAGE
    type: string
  - default: |
      polaris audit --help
    description: |
      The Polaris audit command to execute inside the container. Default is
      'polaris audit --help', which provides the Polaris CLI help output. Customize this
      parameter to specify specific audit rules, file paths, and output formats.
    name: SCRIPT
    type: string
  steps:
  - computeResources: {}
    env:
    - name: TZ
      value: Asia/Seoul
    image: $(params.IMAGE)
    name: polaris-audit
    script: |
      #!/bin/sh
      $(params.SCRIPT)
    workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
  workspaces:
  - name: source
    optional: true
