apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/categories: Security
    tekton.dev/displayName: sonarqube scanner
    tekton.dev/pipelines.minVersion: 0.17.0
    tekton.dev/platforms: linux/amd64
    tekton.dev/tags: security
  labels:
    app.kubernetes.io/version: "0.4.1"
    hub.tekton.dev/catalog: tekton
  name: sonarqube-scanner
  namespace: tekton-catalog
spec:
  description: |-
    The following task can be used to perform static analysis on the source code provided the SonarQube server is hosted
    SonarQube is the leading tool for continuously inspecting the Code Quality and Security of your codebases, all while empowering development teams. Analyze over 25 popular programming languages including C#, VB.Net, JavaScript, TypeScript and C++. It detects bugs, vulnerabilities and code smells across project branches and pull requests.
  params:
  - default: ""
    name: CONTEXT_DIR
    type: string
  - default: ""
    description: SonarQube server URL
    name: SONAR_HOST_URL
    type: string
  - default: ""
    description: Project's unique key
    name: SONAR_PROJECT_KEY
    type: string
  - default: "1.0"
    description: 'Version of the project. Default: 1.0'
    name: PROJECT_VERSION
    type: string
  - default: .
    description: Comma-separated paths to directories containing main source files
    name: SOURCE_TO_SCAN
    type: string
  - default: ""
    description: The organization in sonarqube where the project exists
    name: SONAR_ORGANIZATION
    type: string
  - default: docker.io/sonarsource/sonar-scanner-cli:4.6@sha256:7a976330a8bad1beca6584c1c118e946e7a25fdc5b664d5c0a869a6577d81b4f
    description: The sonarqube scanner CLI image which will run the scan
    name: SONAR_SCANNER_IMAGE
    type: string
  - default: login
    description: Name of the file of the login within the sonarqube credentials workspace
    name: SONAR_LOGIN_KEY
    type: string
  - default: password
    description: Name of the file of the password within the sonarqube credentials
      workspace
    name: SONAR_PASSWORD_KEY
    type: string
  # for links
  - default: ""
    name: SONAR_LINKS_CI
    type: string
  - default: ""
    name: SONAR_LINKS_SCM
    type: string
  # for JAVA
  - default: ""
    name: SONAR_LANGUAGE
    type: string
  - default: ""
    name: SONAR_INCLUSIONS
    type: string
  - default: ""
    name: SONAR_EXCLUSIONS
    type: string
  - default: ""
    name: SONAR_JAVA_SOURCE
    type: string
  - default: ""
    name: SONAR_JAVA_BINARIES
    type: string
  - default: ""
    name: SONAR_JAVA_LIBRARIES
    type: string
  - default: ""
    name: SONAR_JUNIT_REPORTPATHS
    type: string
  - default: "main" 
    name: SONAR_BRANCH_NAME 
    type: string 
  - default: registry.access.redhat.com/ubi8/ubi-minimal:8.2
    name: SONAR_PROP_IMAGE
    type: string
  steps:
  - computeResources: {}
    env:
    - name: SONAR_HOST_URL
      value: $(params.SONAR_HOST_URL)
    - name: SONAR_PROJECT_KEY
      value: $(params.SONAR_PROJECT_KEY)
    - name: PROJECT_VERSION
      value: $(params.PROJECT_VERSION)
    - name: SOURCE_TO_SCAN
      value: $(params.SOURCE_TO_SCAN)
    - name: SONAR_ORGANIZATION
      value: $(params.SONAR_ORGANIZATION)
    # for links
    - name: SONAR_LINKS_CI
      value: $(params.SONAR_LINKS_CI)
    - name: SONAR_LINKS_SCM
      value: $(params.SONAR_LINKS_SCM)
    - name: SONAR_LANGUAGE
      value: $(params.SONAR_LANGUAGE)
    - name: SONAR_INCLUSIONS
      value: $(params.SONAR_INCLUSIONS)
    - name: SONAR_EXCLUSIONS
      value: $(params.SONAR_EXCLUSIONS)
    # for JAVA
    - name: SONAR_JAVA_SOURCE
      value: $(params.SONAR_JAVA_SOURCE)
    - name: SONAR_JAVA_BINARIES
      value: $(params.SONAR_JAVA_BINARIES)
    - name: SONAR_JAVA_LIBRARIES
      value: $(params.SONAR_JAVA_LIBRARIES)
    - name: SONAR_JUNIT_REPORTPATHS
      value: $(params.SONAR_JUNIT_REPORTPATHS)
    - name: SONAR_BRANCH_NAME 
      value: $(params.SONAR_BRANCH_NAME) 
    image: $(params.SONAR_PROP_IMAGE)
    name: sonar-properties-create
    script: |
      #!/usr/bin/env bash

      replaceValues() {
        filename=$1
        thekey=$2
        newvalue=$3

        if ! grep -R "^[#]*\s*${thekey}=.*" $filename >/dev/null; then
          echo "APPENDING because '${thekey}' not found"
          echo "" >>$filename
          echo "$thekey=$newvalue" >>$filename
        else
          echo "SETTING because '${thekey}' found already"
          sed -ir "s|^[#]*\s*${thekey}=.*|$thekey=$newvalue|" $filename
        fi
      }

      if [[ "$(workspaces.sonar-settings.bound)" == "true" ]]; then
        if [[ -f $(workspaces.sonar-settings.path)/sonar-project.properties ]]; then
          echo "using user provided sonar-project.properties file"
          cp -RL $(workspaces.sonar-settings.path)/sonar-project.properties $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties
        fi
      fi

      if [[ -f $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties ]]; then
        if [[ -n "${SONAR_HOST_URL}" ]]; then
          echo "replacing sonar host URL"
          replaceValues $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties sonar.host.url "${SONAR_HOST_URL}"
        fi
        if [[ -n "${SONAR_PROJECT_KEY}" ]]; then
          echo "replacing sonar project key"
          replaceValues $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties sonar.projectKey "${SONAR_PROJECT_KEY}"
        fi
        echo "Values in sonar-project.properties file replaced successfully..."
        pwd
        cat $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties
        cat sonar-project.properties
      else
        echo "Creating sonar-project.properties file..."
        touch sonar-project.properties
        [[ -n "${SONAR_PROJECT_KEY}" ]] && {
          echo "sonar.projectKey=${SONAR_PROJECT_KEY}" >> sonar-project.properties
        } || {
          echo "missing property SONAR_PROJECT_KEY"
          exit 1
        }

        [[ -n "${SONAR_HOST_URL}" ]] && {
          echo "sonar.host.url=${SONAR_HOST_URL}" >> sonar-project.properties
        } || {
          echo "missing property SONAR_HOST_URL"
          exit 1
        }

        [[ -n "${PROJECT_VERSION}" ]] && {
          echo "sonar.projectVersion=${PROJECT_VERSION}" >> sonar-project.properties
        }

        [[ -n "${SONAR_ORGANIZATION}" ]] && {
          echo "sonar.organization=${SONAR_ORGANIZATION}" >> sonar-project.properties
        }

        echo "sonar.sources=${SOURCE_TO_SCAN}" >> sonar-project.properties

        # for branch 
        [[ -n "${SONAR_BRANCH_NAME}" ]] && { 
          echo "sonar.branch.name=${SONAR_BRANCH_NAME}" >> sonar-project.properties 
        } 

        # for links
        [[ -n "${SONAR_LINKS_CI}" ]] && {
          echo "sonar.links.ci=${SONAR_LINKS_CI}" >> sonar-project.properties
        }
        [[ -n "${SONAR_LINKS_SCM}" ]] && {
          echo "sonar.links.scm=${SONAR_LINKS_SCM}" >> sonar-project.properties
          echo "sonar.scm.provider=git" >> sonar-project.properties
        }

        # for JAVA
        [[ -n "${SONAR_LANGUAGE}" ]] && {
          echo "sonar.language=${SONAR_LANGUAGE}" >> sonar-project.properties
        }
        [[ -n "${SONAR_INCLUSIONS}" ]] && {
          echo "sonar.inclusions=${SONAR_INCLUSIONS}" >> sonar-project.properties
        }
        [[ -n "${SONAR_EXCLUSIONS}" ]] && {
          echo "sonar.exclusions=${SONAR_EXCLUSIONS}" >> sonar-project.properties
        }
        [[ -n "${SONAR_JAVA_SOURCE}" ]] && {
          echo "sonar.java.source=${SONAR_JAVA_SOURCE}" >> sonar-project.properties
        }
        [[ -n "${SONAR_JAVA_BINARIES}" ]] && {
          echo "sonar.java.binaries=${SONAR_JAVA_BINARIES}" >> sonar-project.properties
        }
        [[ -n "${SONAR_JAVA_LIBRARIES}" ]] && {
          echo "sonar.java.libraries=${SONAR_JAVA_LIBRARIES}" >> sonar-project.properties
        }
        [[ -n "${SONAR_JUNIT_REPORTPATHS}" ]] && {
          echo "sonar.junit.reportPaths=${SONAR_JUNIT_REPORTPATHS}" >> sonar-project.properties
        }

        echo "---------------------------"
        cat $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties
      fi

      if [[ "$(workspaces.sonar-credentials.bound)" == "true" ]]; then
        if [[ -f $(workspaces.sonar-credentials.path)/$(params.SONAR_PASSWORD_KEY) ]]; then
          SONAR_PASSWORD=`cat $(workspaces.sonar-credentials.path)/$(params.SONAR_PASSWORD_KEY)`
          replaceValues $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties sonar.password "${SONAR_PASSWORD}"
        fi
        if [[ -f $(workspaces.sonar-credentials.path)/$(params.SONAR_LOGIN_KEY) ]]; then
          SONAR_LOGIN=`cat $(workspaces.sonar-credentials.path)/$(params.SONAR_LOGIN_KEY)`
          replaceValues $(workspaces.source.path)/$(params.CONTEXT_DIR)/sonar-project.properties sonar.login "${SONAR_LOGIN}"
        fi
      fi
    workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
  - computeResources: {}
    env:
    - name: TZ
      value: Asia/Seoul
    # command:
    # - sonar-scanner
    image: $(params.SONAR_SCANNER_IMAGE)
    name: sonar-scan
    workingDir: $(workspaces.source.path)/$(params.CONTEXT_DIR)
    script: |
      #!/usr/bin/env bash

      if [ "$(workspaces.ssl-ca-directory.bound)" = "true" ]; then
        for f in $(workspaces.ssl-ca-directory.path)/*
        do
          $JAVA_HOME/bin/keytool -importcert -file "${f}" -alias $(basename "${f}") -cacerts -storepass changeit -noprompt
        done
      fi

      sonar-scanner
  workspaces:
  - description: Workspace containing the code which needs to be scanned by SonarQube
    name: source
  - name: ssl-ca-directory
    optional: true
  - description: Optional workspace where SonarQube properties can be mounted
    name: sonar-settings
    optional: true
  - description: |
      A workspace containing a login or password for use within sonarqube.
    name: sonar-credentials
    optional: true
  - description: Local repo (m2) workspace
    name: maven-local-repo
    optional: true