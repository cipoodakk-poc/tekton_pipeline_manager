---
# gitea에 oauth애플리케이션 등록후 발행된 secret코드 (oauth2-proxy를 통해 gitea 인증 후 tekton 대시보드 접근 기능용)
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-gitea
  namespace: tekton-pipelines
  labels:
    app: tekton-dashboard-auth
    #app: tekton-dashboard-auth-oidc
type: Opaque
stringData:
  # [gitea] 사이트관리 > Admin Settings > Integrations
  # Application Name : tekton-dashboard-auth
  # Redirect URIs: https://tekton.{{nnd_domain_name}}/oauth2/callback
  client_id: {{oauth_client_id}}
  client_secret: {{oauth_client_secret}}
---
# oauth2-proxy 설정 정보 (oauth2-proxy를 통해 gitea 인증 후 tekton 대시보드 접근 기능용)
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-gitea
  namespace: tekton-pipelines
  labels:
    app: tekton-dashboard-auth
data:
  oauth2_proxy_gitea.cfg: |
    ## https://oauth2-proxy.github.io/oauth2-proxy/configuration/overview
    ## https://github.com/oauth2-proxy/oauth2-proxy/blob/master/contrib/local-environment/oauth2-proxy-gitea.cfg

    http_address="0.0.0.0:4180"
    cookie_secret="OQINaROshtE9TcZkNAm-5Zs2Pv3xaWytBmc5W7sPX7w=" # openssl rand -base64 32 | tr -- '+/' '-_'
    email_domains=["*"]
    cookie_secure=true
    upstreams="{{tekton_domain}}"
    cookie_domains=[".{{nnd_domain_name}}"] # Required so cookie can be read on all subdomains.
    whitelist_domains=[".{{nnd_domain_name}}"] # Required to allow redirection back to original requested target.

    redirect_url="{{tekton_domain}}/oauth2/callback"

    ## OpenID Connect Provider
    ## https://docs.gitea.com/development/oauth2-provider
    ## https://oauth2-proxy.github.io/oauth2-proxy/configuration/providers/openid_connect
    provider="oidc"
    provider_display_name="Gitea OIDC"
    oidc_issuer_url="{{gitea_domain}}/"
    code_challenge_method="S256"
    set_xauthrequest=true
    ssl_insecure_skip_verify=true
    
    cookie_samesite="none"
    cookie_expire="0"
---
# oauth2-proxy 배포
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: tekton-pipelines
  labels:
    app: tekton-dashboard-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tekton-dashboard-auth
  template:
    metadata:
      labels:
        app: tekton-dashboard-auth
    spec:
      containers:
      - image: {{image_registry}}/nnd/oauth2-proxy:v7.8.1
        name: oauth2-proxy
        args:
        - --config=/etc/oauth2_proxy/oauth2_proxy_gitea.cfg
        env:
        - name: OAUTH2_PROXY_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-gitea
              key: client_id
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-gitea
              key: client_secret
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          #runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 4180
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/oauth2_proxy
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values:
{%- for node in node_selector_list %}
                - {{node}}
{%- endfor %}
      volumes:
      - name: config
        configMap:
          name: oauth2-proxy-gitea
          defaultMode: 420
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: tekton-pipelines
  labels:
    app: tekton-dashboard-auth
spec:
  ports:
  - name: http
    port: 4180
    protocol: TCP
    targetPort: 4180
  selector:
    app: tekton-dashboard-auth
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Gitea OpenID Connect 연동시 추가 설정
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers: "4 32k"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "64k"
    nginx.ingress.kubernetes.io/large-client-header-buffers: "4 16k"
  name: ing-oauth2-proxy
  namespace: tekton-pipelines
  labels:
    app: tekton-dashboard-auth
spec:
  ingressClassName: nginx
  rules:
  - host: {{tekton_host_url}}
    http:
      paths:
      - backend:
          service:
            name: oauth2-proxy
            port:
              name: http
        path: /oauth2
        pathType: Prefix
  tls:
  - hosts:
    - {{tekton_host_url}}
    secretName: tekton-ssl
---
# tekton ingress에 oauht2관련 설정 추가
# 10.10.10.1 oauth.nip.io
# subpath 형식과 prefix 형식은 구분되어서 작성되어야 함
# rewrite, path, host 정보가 변경됨
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy.tekton-pipelines.svc.cluster.local:4180/oauth2/auth # oauth2
    nginx.ingress.kubernetes.io/auth-signin: https://$host/oauth2/sign_in?rd=$escaped_request_uri # oauth2
    nginx.ingress.kubernetes.io/configuration-snippet: |
      auth_request_set $user $upstream_http_x_auth_request_preferred_username;
      auth_request_set $group $upstream_http_x_auth_request_groups;
      proxy_set_header Impersonate-User $user;
      access_by_lua_block {
        local groups = ngx.var.group or ""
        local ngx_req = require "ngx.req"
        if groups ~= "" then
          groups = groups .. ",tekton-dashboard-users"
          for group in groups:gmatch("[^,]+") do
            ngx_req.add_header("Impersonate-Group", group)
          end
        end
      }    
  name: ing-tekton
  namespace: tekton-pipelines
spec:
  ingressClassName: nginx
  rules:
  - host: {{tekton_host_url}}
    http:
      paths:
      - backend:
          service:
            name: tekton-dashboard
            port:
              name: http
              # number: 9097
        path: /
        # pathType: Prefix
        pathType: ImplementationSpecific # oauth2
  tls:
    - hosts:
      - {{tekton_host_url}}
      secretName: tekton-ssl