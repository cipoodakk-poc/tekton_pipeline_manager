# 어플리케이션 클러스터에서 실행
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{organization_name}}-dev
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{organization_name}}-sc
parameters:
  server: {{dev_frontend_nas_ip}}
  share: {{dev_frontend_nas_path}}
provisioner: nfs.csi.k8s.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
apiVersion: v1
kind: Secret
metadata:
  name: regcred
  namespace: {{organization_name}}-dev
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |-
    {
        "auths": {
            "{{image_registry}}": {
                "username":"{{harbor_robot_id}}",
                "password":"{{harbor_robot_pw}}",
                "auth": "{{harbor_robot_auth}}"
            }
        }
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: secret-tls
  namespace: {{organization_name}}-dev
type: kubernetes.io/tls
stringData:
  tls.crt: |
    {{wildcard_dev_ssl_crt|indent(4)}}

  tls.key: |
    {{wildcard_dev_ssl_key|indent(4)}}