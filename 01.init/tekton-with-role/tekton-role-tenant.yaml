apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/instance: default
    app.kubernetes.io/part-of: tekton-dashboard
  name: tekton-dashboard-tenant
rules:
  # Tekton Dashboard Extension 리소스 조회
  - apiGroups: ["dashboard.tekton.dev"]
    resources: ["extensions"]
    verbs: ["get", "list", "watch"]

  # 네임스페이스/파드/로그 등 기본 k8s 리소스 조회
  - apiGroups: [""]
    resources: ["events", "namespaces", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Tekton task, pipeline, run 리소스 조회
  - apiGroups: ["tekton.dev"]
    resources: ["tasks", "taskruns", "pipelines", "pipelineruns", "customruns"]
    verbs: ["get", "list", "watch"]

  # Tekton Triggers 관련 리소스 조회
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "interceptors", "triggerbindings", "triggers", "triggertemplates"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/instance: default
    app.kubernetes.io/part-of: tekton-dashboard
    rbac.dashboard.tekton.dev/subject: tekton-dashboard
  name: tekton-dashboard-tenant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-dashboard-tenant
subjects:
- kind: ServiceAccount
  name: tekton-dashboard
  namespace: tekton-pipelines
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: tekton-dashboard-users